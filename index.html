<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#5b85a8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="記帳" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="./icon-512.png" />
  <title>記帳 LEDGER 個人版</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body, #root {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
        "Microsoft JhengHei", "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      user-select: none;
      -webkit-user-select: none;
    }
    /* 載入畫面 */
    #boot {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      background: #f5f5f5;
      z-index: 9999;
      transition: opacity 0.3s;
    }
    #boot.hide { opacity: 0; pointer-events: none; }
    #boot img {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      box-shadow: 0 4px 16px rgba(91, 133, 168, 0.25);
    }
    #boot .label {
      font-size: 14px;
      color: #888;
      letter-spacing: 1px;
    }
    .spinner {
      width: 22px;
      height: 22px;
      border: 2.5px solid #d8e4ee;
      border-top-color: #5b85a8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="boot">
    <img src="./icon-192.png" alt="載入中" />
    <div class="spinner"></div>
    <div class="label">記帳 LEDGER 個人版</div>
  </div>
  <div id="root"></div>

  <!-- React + ReactDOM (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel 在瀏覽器即時編譯 JSX(免 build step) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 主程式 -->
  <script type="text/babel" data-presets="env,react" src="./ledger.jsx"></script>

  <script>
    // ledger.jsx 載入完成後會把元件 mount 到 #root,這時把 boot 畫面淡出
    // 用 MutationObserver 偵測 #root 內容出現
    const root = document.getElementById('root');
    const boot = document.getElementById('boot');
    const observer = new MutationObserver(() => {
      if (root.children.length > 0) {
        boot.classList.add('hide');
        setTimeout(() => boot.remove(), 300);
        observer.disconnect();
      }
    });
    observer.observe(root, { childList: true });
    // 保險:10 秒後還沒消失就強制移除(避免 ledger 沒成功 mount 卻卡 boot)
    setTimeout(() => boot.classList.add('hide'), 10000);
  </script>
</body>
</html>
