<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#141619" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="記帳" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
  <link rel="apple-touch-icon" href="./icon-180.png" />

  <!-- 中文字體:只載 Noto Sans TC(數字已改用系統 SF Pro / Roboto / Segoe UI) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" />

  <title>記帳 LEDGER 個人版</title>

  <style>
    html, body, #root {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #141619;
      overflow: hidden;
    }
    body {
      font-family: 'Noto Sans TC', -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    }
    /* 安裝橫幅樣式 */
    #installBanner {
      position: fixed;
      left: 12px; right: 12px; bottom: 12px;
      z-index: 9998;
      display: none;
      align-items: center; gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      background: linear-gradient(135deg, #2faa83 0%, #277e64 100%);
      color: #fff;
      box-shadow: 0 6px 20px rgba(47, 170, 131, 0.35);
      font-size: 13.5px;
      font-family: 'Noto Sans TC', sans-serif;
    }
    #installBanner .text { flex: 1; line-height: 1.5; }
    #installBanner .text b { font-weight: 700; }
    #installBanner button {
      border: none; cursor: pointer; padding: 0;
    }
    #installBtn {
      background: #f4c542; color: #1a1a1a;
      padding: 8px 14px; border-radius: 10px;
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.5px;
    }
    #installClose {
      flex-shrink: 0;
      background: rgba(255,255,255,0.18); color: #fff;
      width: 28px; height: 28px; border-radius: 50%;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Android Chrome 的安裝橫幅 -->
  <div id="installBanner">
    <div class="text">將「<b>記帳</b>」安裝至桌面,離線也能用</div>
    <button id="installBtn">安裝</button>
    <button id="installClose" aria-label="關閉">×</button>
  </div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="./ledger.js"></script>

  <script>
    // Service Worker 註冊
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }

    // 安裝橫幅(Android Chrome)
    let deferredPrompt = null;
    function isStandalone() {
      return window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone === true;
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (isStandalone()) return;
      try { if (localStorage.getItem('ledger_install_dismissed_v1')) return; } catch {}
      document.getElementById('installBanner').style.display = 'flex';
    });

    document.getElementById('installBtn').onclick = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('installBanner').style.display = 'none';
    };
    document.getElementById('installClose').onclick = () => {
      document.getElementById('installBanner').style.display = 'none';
      try { localStorage.setItem('ledger_install_dismissed_v1', '1'); } catch {}
    };

    window.addEventListener('appinstalled', () => {
      document.getElementById('installBanner').style.display = 'none';
      try { localStorage.setItem('ledger_install_dismissed_v1', '1'); } catch {}
    });
  </script>
</body>
</html>
