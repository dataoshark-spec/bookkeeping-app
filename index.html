<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#141619" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="記帳" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png" />
  <link rel="apple-touch-icon" href="./icon-180.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png" />

  <!-- 字體:多 CDN 備援 + JS 偵測自動切換 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link id="font-google" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=block" />

  <!-- 預先連線 + 預先下載 React / 主程式(平行下載,大幅加速啟動) -->
  <link rel="preload" as="script" href="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js" crossorigin />
  <link rel="preload" as="script" href="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin />
  <link rel="preload" as="script" href="./ledger.js" />

  <!-- 字體 fallback CSS:用 jsDelivr 直接抓字體檔(備援用) -->
  <style id="font-fallback">
    /* Space Grotesk (jsDelivr, GitHub raw) */
    @font-face {
      font-family: 'Space Grotesk JsD';
      font-style: normal;
      font-weight: 400;
      font-display: block;
      src: url('https://cdn.jsdelivr.net/gh/floriankarsten/space-grotesk@master/fonts/webfonts/SpaceGrotesk-Regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Space Grotesk JsD';
      font-style: normal;
      font-weight: 500;
      font-display: block;
      src: url('https://cdn.jsdelivr.net/gh/floriankarsten/space-grotesk@master/fonts/webfonts/SpaceGrotesk-Medium.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Space Grotesk JsD';
      font-style: normal;
      font-weight: 700;
      font-display: block;
      src: url('https://cdn.jsdelivr.net/gh/floriankarsten/space-grotesk@master/fonts/webfonts/SpaceGrotesk-Bold.woff2') format('woff2');
    }
    /* Noto Sans TC (jsDelivr from cdnfonts) */
    @font-face {
      font-family: 'Noto Sans TC JsD';
      font-style: normal;
      font-weight: 400;
      font-display: block;
      src: url('https://cdn.jsdelivr.net/npm/cjk-fonts@1.0.0/dist/NotoSansTC-Regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Noto Sans TC JsD';
      font-style: normal;
      font-weight: 700;
      font-display: block;
      src: url('https://cdn.jsdelivr.net/npm/cjk-fonts@1.0.0/dist/NotoSansTC-Bold.woff2') format('woff2');
    }
  </style>

  <title>記帳 LEDGER 個人版</title>

  <!-- 預先套用使用者主題色,避免主畫面 mount 時背景閃黑/閃白 -->
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('ledger_theme_v1');
        if (!theme) theme = 'dark'; // 預設深色
        var bg = theme === 'light' ? '#f5f6f8' : '#141619';
        document.documentElement.style.background = bg;
        // 用 data attribute 讓 CSS 套對應背景
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body, #root {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }
    /* 主題色:預設深色,有 data-theme="light" 才切淺色 */
    /* html 跟 body 都要設深色不透明,確保 PWA 視窗開啟瞬間就是深色,而不是看穿到桌面 */
    html { background: #141619; }
    html[data-theme="light"] { background: #f5f6f8; }
    html[data-theme="light"] body { background: #f5f6f8; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
        "Microsoft JhengHei", "Helvetica Neue", Arial, sans-serif;
      background: #141619;
      color: #1a1a1a;
      user-select: none; -webkit-user-select: none;
    }

    #installBanner, #iosBanner, #updateBanner {
      position: fixed;
      left: 12px; right: 12px; bottom: 12px;
      z-index: 9998;
      display: none;
      align-items: center; gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      animation: slideUp 0.32s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    @keyframes slideUp {
      from { transform: translateY(110%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    #installBanner, #iosBanner {
      background: linear-gradient(135deg, #2faa83 0%, #277e64 100%);
      color: #fff;
      box-shadow: 0 6px 20px rgba(47, 170, 131, 0.35);
      font-size: 13.5px;
    }
    #installBanner .text, #iosBanner .text { flex: 1; line-height: 1.5; }
    #installBanner .text b { font-weight: 700; }
    #installBanner button.action {
      background: #f4c542; color: #1a1a1a; border: none;
      padding: 8px 14px; border-radius: 10px;
      font-size: 13px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.5px;
    }
    #installBanner button.action:active { transform: scale(0.96); }
    .close {
      flex-shrink: 0;
      background: rgba(255,255,255,0.18); color: #fff; border: none;
      width: 28px; height: 28px; border-radius: 50%;
      font-size: 16px; cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
    }
    #updateBanner {
      background: #2c3a4a; color: #fff;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      font-size: 13px;
    }
    #updateBanner .text { flex: 1; }
    #updateBanner button.action {
      background: #5b85a8; color: #fff; border: none;
      padding: 6px 12px; border-radius: 8px;
      font-size: 12.5px; font-weight: 600; cursor: pointer;
    }

    /* === 啟動銜接畫面(防止 splash 消失後看到 Android 桌面)=== */
    /* 跟 manifest 的 background_color (#141619) 一致 */
    /* React mount 後此元素淡出移除 */
    #boot {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #141619;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.25s ease-out;
    }
    #boot.hide {
      opacity: 0;
      pointer-events: none;
    }
    #boot img {
      width: 100px;
      height: 100px;
      border-radius: 22px;
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <!-- 銜接畫面:從 splash 自然過渡到主畫面,避免看到 Android 桌面 -->
  <div id="boot">
    <img src="./icon-192.png" alt="" />
  </div>

  <div id="root"></div>

  <div id="installBanner">
    <div class="text">將「<b>記帳</b>」安裝至桌面,離線也能用</div>
    <button class="action" id="installBtn">安裝</button>
    <button class="close" id="installClose" aria-label="關閉">×</button>
  </div>

  <div id="iosBanner">
    <div class="text">
      <div>📱 點下方分享 → 加入主畫面</div>
      <div style="font-size:11.5px; opacity:0.85; margin-top:3px">即可離線使用、像 App 一樣開啟</div>
    </div>
    <button class="close" id="iosClose" aria-label="關閉">×</button>
  </div>

  <div id="updateBanner">
    <div class="text">有新版本可用</div>
    <button class="action" id="updateBtn">重新載入</button>
  </div>

  <!-- React + ReactDOM (UMD,jsDelivr 在台灣比 unpkg 快很多) -->
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <!-- 主程式(預編譯 JS) -->
  <script src="./ledger.js"></script>

  <script>
    // ============ 銜接畫面淡出 ============
    // 等 React 真的 mount 完(root 有可見內容)再淡出 boot
    (function () {
      const root = document.getElementById('root');
      const boot = document.getElementById('boot');
      if (!boot || !root) return;
      let done = false;
      const dismiss = () => {
        if (done) return;
        done = true;
        boot.classList.add('hide');
        setTimeout(() => boot.remove(), 280);
      };
      const observer = new MutationObserver(() => {
        if (root.children.length > 0 && root.firstElementChild?.offsetHeight > 0) {
          // 等瀏覽器 paint 完才淡出,避免白底瞬間
          requestAnimationFrame(() => requestAnimationFrame(dismiss));
          observer.disconnect();
        }
      });
      observer.observe(root, { childList: true, subtree: true });
      // 8 秒保險
      setTimeout(dismiss, 8000);
    })();

    // ============ 字體載入偵測(關鍵) ============
    // Google Fonts 載不到時,自動切換用 jsDelivr 備援字體
    (function ensureFontLoaded() {
      if (!('fonts' in document)) return;

      // 用 Promise 偵測:3 秒內 Space Grotesk 700 沒載入完成就啟動備援
      Promise.race([
        document.fonts.load('700 17px "Space Grotesk"'),
        new Promise((_, rej) => setTimeout(() => rej('timeout'), 3000)),
      ]).then(() => {
        // 檢查是不是真的有 Space Grotesk(不是 fallback)
        if (!document.fonts.check('700 17px "Space Grotesk"')) {
          throw new Error('not really loaded');
        }
        console.log('[Font] Google Fonts 成功載入');
      }).catch(() => {
        console.warn('[Font] Google Fonts 載入失敗,啟用 jsDelivr 備援');
        // 注入 CSS 改用備援字體名稱
        const overrideStyle = document.createElement('style');
        overrideStyle.textContent = `
          * { font-family: 'Space Grotesk JsD', 'Noto Sans TC JsD', -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif !important; }
          [style*="Space Grotesk"] { font-family: 'Space Grotesk JsD', 'Space Grotesk', sans-serif !important; }
        `;
        document.head.appendChild(overrideStyle);
        // 主動載 jsDelivr 字體
        document.fonts.load('700 17px "Space Grotesk JsD"').then(() => {
          console.log('[Font] jsDelivr 備援成功');
        }).catch(() => {
          console.error('[Font] 連備援也失敗,用系統字體');
        });
      });
    })();

    // ============ Service Worker 註冊 ============
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then((reg) => {
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                document.getElementById('updateBanner').style.display = 'flex';
                document.getElementById('updateBtn').onclick = () => {
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                  window.location.reload();
                };
              }
            });
          });
        }).catch(() => {});
      });
    }

    // ============ Android 安裝橫幅 ============
    let deferredPrompt = null;
    const INSTALL_DISMISS_KEY = 'ledger_install_dismissed_v1';
    function isStandalone() {
      return window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone === true;
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (isStandalone()) return;
      try { if (localStorage.getItem(INSTALL_DISMISS_KEY)) return; } catch {}
      document.getElementById('installBanner').style.display = 'flex';
    });

    document.getElementById('installBtn').onclick = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('installBanner').style.display = 'none';
    };
    document.getElementById('installClose').onclick = () => {
      document.getElementById('installBanner').style.display = 'none';
      try { localStorage.setItem(INSTALL_DISMISS_KEY, '1'); } catch {}
    };

    window.addEventListener('appinstalled', () => {
      document.getElementById('installBanner').style.display = 'none';
      try { localStorage.setItem(INSTALL_DISMISS_KEY, '1'); } catch {}
    });

    (function () {
      if (isStandalone()) return;
      const ua = navigator.userAgent;
      const isIOS = /iPhone|iPad|iPod/.test(ua) && !window.MSStream;
      const isSafari = isIOS && /Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS/.test(ua);
      if (!isSafari) return;
      try { if (localStorage.getItem(INSTALL_DISMISS_KEY)) return; } catch {}
      setTimeout(() => {
        document.getElementById('iosBanner').style.display = 'flex';
      }, 1500);
      document.getElementById('iosClose').onclick = () => {
        document.getElementById('iosBanner').style.display = 'none';
        try { localStorage.setItem(INSTALL_DISMISS_KEY, '1'); } catch {}
      };
    })();
  </script>
</body>
</html>
